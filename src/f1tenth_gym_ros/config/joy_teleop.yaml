joy:
  ros__parameters:
    # device_name: /dev/input/joypad-f710
    device_id: 0
    deadzone: 0.01
    autorepeat_rate: 20.0
    coalesce_interval: 0.01

joy_teleop:
  ros__parameters:
    default:
      type: topic
      interface_type: ackermann_msgs/msg/AckermannDriveStamped
      topic_name: teleop
      axis_mappings:
        drive-speed:
          axis: 1
          scale: 0.0
          offset: 0.0
        drive-steering_angle:
          axis: 2
          scale: 0.0
          offset: 0.0

    human_control:
      type: topic
      interface_type: ackermann_msgs/msg/AckermannDriveStamped
      topic_name: teleop
      deadman_buttons: [4]
      axis_mappings:
        drive-speed:
          axis: 1
          scale: 2.2
          offset: 0.0
        drive-steering_angle:
          axis: 3
          scale: 0.2
          offset: 0.0

    autonomous_control:
      type: topic
      interface_type: std_msgs/msg/Bool
      topic_name: pause_navigation
      deadman_buttons: [5]
      toggle_mode: true
      publish_toggle_state: true
      inverted: true
      message_value:
        data:
          value: false

    aeb_control:
      type: topic
      interface_type: std_msgs/msg/Bool
      topic_name: aeb_active
      deadman_buttons: [0]
      toggle_mode: true
      publish_toggle_state: true
      message_value:
        data:
          value: false
